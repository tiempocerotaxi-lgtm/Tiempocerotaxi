<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiempo Cero Taxi APP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet"><style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0a0a0a;
color:white;
}

.app{
max-width:420px;
margin:auto;
min-height:100vh;
background:#111;
position:relative;
overflow:hidden;
}

.header{
padding:25px;
text-align:center;
background:linear-gradient(90deg,#ffd000,#ff9d00);
color:black;
font-weight:800;
font-size:26px;
letter-spacing:2px;
}

.map{
height:300px;
}

.card{
background:#181818;
margin:-60px 20px 20px 20px;
padding:25px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,.7);
animation:slideUp .6s ease;
}

@keyframes slideUp{
from{transform:translateY(80px);opacity:0}
to{transform:translateY(0);opacity:1}
}

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:none;
font-size:15px;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ffd000,#ff9d00);
font-weight:700;
font-size:17px;
}

.fleet{
display:flex;
overflow:auto;
gap:12px;
padding:20px;
}

.car{
min-width:150px;
background:#181818;
border-radius:18px;
padding:10px;
text-align:center;
transition:.4s;
}

.car:hover{
transform:scale(1.06);
}

.car img{
width:100%;
border-radius:12px;
}

.testimonials{
padding:20px;
}

.test{
background:#181818;
padding:18px;
border-radius:15px;
margin-bottom:10px;
animation:fade .8s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:18px;
border-radius:50%;
font-size:22px;
text-decoration:none;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.footer{
text-align:center;
padding:25px;
color:#aaa;
}
</style></head><body><div class="app"><div class="header">TIEMPO CERO TAXI</div><div class="map">
<iframe id="mapa" src="https://www.google.com/maps?q=Quito&output=embed" width="100%" height="300" style="border:0"></iframe>
</div><div class="card">
<h3>🚖 Pedir Taxi</h3><input id="nombre" placeholder="Tu nombre">
<input id="telefono" placeholder="Tu teléfono">
<input id="ubicacion" placeholder="Detectando ubicación...">
<textarea id="destino" placeholder="¿A dónde vas?"></textarea><button onclick="pedirTaxi()">SOLICITAR AHORA</button>

<button onclick="obtenerUbicacion()">📍 Usar mi GPS</button>

</div><div class="fleet">
<div class="car">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=400&q=60">
<p>Sedan</p>
</div>
<div class="car">
<img src="https://images.unsplash.com/photo-1549921296-3a6b4e4c4b3d?auto=format&fit=crop&w=400&q=60">
<p>Taxi Ejecutivo</p>
</div>
<div class="car">
<img src="https://images.unsplash.com/photo-1590362891991-f776e747a588?auto=format&fit=crop&w=400&q=60">
<p>Familiar</p>
</div>
</div><div class="testimonials">
<div class="test">⭐ "Llegaron en 3 minutos, increíble servicio"</div>
<div class="test">⭐ "Muy seguros y amables"</div>
<div class="test">⭐ "Siempre los uso"</div>
</div><div class="footer">
Dominio recomendado 🌐 <b>tiempocerotaxi.com</b>
</div></div><a class="whatsapp" href="https://wa.me/593990922056">💬</a>

<script>

function pedirTaxi(){

let nombre=document.getElementById('nombre').value;
let telefono=document.getElementById('telefono').value;
let ubicacion=document.getElementById('ubicacion').value;
let destino=document.getElementById('destino').value;

let mensaje=`🚖 SOLICITUD TAXI TIEMPO CERO %0A
Nombre: ${nombre}%0A
Telefono: ${telefono}%0A
Ubicación: ${ubicacion}%0A
Destino: ${destino}`;

window.open(`https://wa.me/593990922056?text=${mensaje}`);

}

function obtenerUbicacion(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

let link=`https://www.google.com/maps?q=${lat},${lon}`;

document.getElementById('ubicacion').value=link;

});

}else{
alert('GPS no disponible');
}

}

</script></body>
  </html>
